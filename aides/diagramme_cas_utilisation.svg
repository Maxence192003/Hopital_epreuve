  <line x1="155" y1="340" x2="420" y2="540" class="connector" />
  <line x1="155" y1="365" x2="665" y2="250" class="connector" />

  <line x1="155" y1="580" x2="430" y2="210" class="connector" />
  <line x1="155" y1="600" x2="665" y2="250" class="connector" />
  <line x1="155" y1="625" x2="645" y2="380" class="connector" />
