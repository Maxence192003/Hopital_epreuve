<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .actor-label { font: 600 22px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .system-label { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .usecase { fill: #f8fafc; stroke: #2563eb; stroke-width: 2.5; }
      .usecase-text { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #111827; text-anchor: middle; dominant-baseline: middle; }
      .system-box { fill: #f9fafb; stroke: #475569; stroke-width: 2.5; rx: 18; }
      .connector { stroke: #64748b; stroke-width: 2.5; fill: none; }
      .actor-stroke { stroke: #111827; stroke-width: 3; fill: none; stroke-linecap: round; }
      .actor-head { fill: #111827; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="#ffffff" />
  <text x="800" y="48" text-anchor="middle" class="title">Diagramme de cas d'utilisation - Gestion hospitaliere</text>

  <rect x="330" y="90" width="940" height="820" class="system-box" />
  <text x="800" y="125" text-anchor="middle" class="system-label">Application web de suivi hospitalier</text>

  <ellipse cx="580" cy="210" rx="150" ry="42" class="usecase" />
